---
# discover_credential_configs.yml
# Discovers non-secret configuration fields (like *_BASE_URL) from all credentials
# attached to the current job template.
#
# Usage: Include this in your playbook to dynamically build a config map
#   - name: Discover credential configurations
#     ansible.builtin.include_tasks: discover_credential_configs.yml
#
# Produces:
#   - credential_configs: dict keyed by credential name with all non-secret inputs
#   - base_urls: dict keyed by credential name with only *_BASE_URL fields

- name: Set controller connection facts
  ansible.builtin.set_fact:
    _controller_host: "{{ lookup('env', 'CONTROLLER_HOST') | default(lookup('env', 'AWX_HOST'), true) }}"
    _controller_token: "{{ lookup('env', 'CONTROLLER_OAUTH_TOKEN') | default(lookup('env', 'AWX_OAUTH_TOKEN'), true) }}"
    _job_template_id: "{{ tower_job_template_id | default(awx_job_template_id) }}"

- name: Validate controller connection info
  ansible.builtin.assert:
    that:
      - _controller_host | length > 0
      - _controller_token | length > 0
      - _job_template_id is defined
    fail_msg: "Missing controller connection info. Is this running inside AAP/AWX?"
    success_msg: "Controller connection info validated"

- name: Get credentials attached to this job template
  ansible.builtin.uri:
    url: "https://{{ _controller_host }}/api/v2/job_templates/{{ _job_template_id }}/credentials/"
    method: GET
    headers:
      Authorization: "Bearer {{ _controller_token }}"
    validate_certs: "{{ controller_validate_certs | default(true) }}"
  register: _jt_credentials_response

- name: Get detailed info for each credential
  ansible.builtin.uri:
    url: "https://{{ _controller_host }}/api/v2/credentials/{{ item.id }}/"
    method: GET
    headers:
      Authorization: "Bearer {{ _controller_token }}"
    validate_certs: "{{ controller_validate_certs | default(true) }}"
  loop: "{{ _jt_credentials_response.json.results }}"
  loop_control:
    label: "{{ item.name }}"
  register: _credential_details

- name: Get credential type info for each credential
  ansible.builtin.uri:
    url: "https://{{ _controller_host }}/api/v2/credential_types/{{ item.json.credential_type }}/"
    method: GET
    headers:
      Authorization: "Bearer {{ _controller_token }}"
    validate_certs: "{{ controller_validate_certs | default(true) }}"
  loop: "{{ _credential_details.results }}"
  loop_control:
    label: "{{ item.json.name }}"
  register: _credential_types

- name: Build credential configs dictionary
  ansible.builtin.set_fact:
    credential_configs: >-
      {{
        credential_configs | default({}) | combine({
          item.json.name: {
            'credential_type': (_credential_types.results | selectattr('json.id', 'eq', item.json.credential_type) | first).json.name,
            'inputs': item.json.inputs | default({})
          }
        })
      }}
  loop: "{{ _credential_details.results }}"
  loop_control:
    label: "{{ item.json.name }}"

- name: Extract base URL fields from all credentials
  ansible.builtin.set_fact:
    base_urls: >-
      {{
        base_urls | default({}) | combine({
          item.key: item.value.inputs | dict2items 
            | selectattr('key', 'search', '(?i)_base_url$|_url$|_endpoint$') 
            | items2dict
        })
      }}
  loop: "{{ credential_configs | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when: item.value.inputs | dict2items | selectattr('key', 'search', '(?i)_base_url$|_url$|_endpoint$') | list | length > 0

- name: Display discovered credential configurations
  ansible.builtin.debug:
    msg:
      - "=== Credential Configurations ==="
      - "{{ credential_configs | to_nice_yaml }}"
  when: _discover_debug | default(false)

- name: Display discovered base URLs
  ansible.builtin.debug:
    msg:
      - "=== Base URLs ==="
      - "{{ base_urls | default({}) | to_nice_yaml }}"
  when: _discover_debug | default(false)

- name: Summary
  ansible.builtin.debug:
    msg: "Discovered {{ credential_configs | length }} credentials, {{ base_urls | default({}) | length }} with URL configurations"
